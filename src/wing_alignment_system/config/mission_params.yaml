tracer1:
  goto_pose_node:
    ros__parameters:
      robot_name: "tracer1"
      mocap_topic: "/Rigid17/pose"
      cmd_topic: "cmd_vel_desired"

      swap_xz: false
      negate_x: false
      negate_z: true
      flip_heading_sign: false
      heading_deg_bias: 0.0

      # ===== 默认 / 最终粗定位模式 =====
      v_nominal: 0.20
      v_max: 0.25
      w_max: 0.65

      pos_tol: 0.05
      yaw_tol_deg: 3.0
      k_yaw: 1.5

      slow_radius: 0.30
      v_slow_max: 0.08
      w_slow_max: 0.30

      v_min_far: 0.04
      near_rotate_only_deg: 12.0
      rotate_only_deg: 20.0

      align_yaw_at_goal: true
      treat_zero_yaw_as_keep: false

      goal_reached_latch_sec: 1.0
      stop_hold_sec: 1.0
      pose_timeout_sec: 0.25
      final_stop_hold_sec: 0.35

      dv_max: 0.20
      dw_max: 0.80

      # ===== precision mode 真正进入底盘控制 =====
      precision_v_max: 0.06
      precision_w_max: 0.25
      precision_k_x: 1.20
      precision_k_y: 2.20
      precision_k_yaw: 1.00
      precision_k_heading: 1.10
      precision_rotate_only_deg: 9.0
      precision_deadband_x: 0.006
      precision_deadband_y: 0.004
      precision_deadband_yaw_deg: 2.0
      precision_pos_tol: 0.025
      precision_yaw_tol_deg: 2.0
      precision_final_stop_radius: 0.020
      precision_final_stop_yaw_tol_deg: 2.5

      # ===== staging 快速模式 =====
      staging_profile_code: 1.0
      staging_v_nominal: 0.25
      staging_v_max: 0.25
      staging_w_max: 0.65

      staging_pos_tol: 0.06
      staging_yaw_tol_deg: 8.0

      staging_slow_radius: 0.18
      staging_v_slow_max: 0.12
      staging_w_slow_max: 0.35

      staging_v_min_far: 0.06
      staging_near_rotate_only_deg: 8.0
      staging_rotate_only_deg: 15.0

      staging_align_yaw_at_goal: false

      # ===== transport 带载低速模式 =====
      transport_profile_code: 2.0
      transport_v_nominal: 0.10
      transport_v_max: 0.12
      transport_w_max: 0.25

      transport_pos_tol: 0.06
      transport_yaw_tol_deg: 4.0

      transport_slow_radius: 0.40
      transport_v_slow_max: 0.05
      transport_w_slow_max: 0.18

      transport_v_min_far: 0.03
      transport_near_rotate_only_deg: 10.0
      transport_rotate_only_deg: 16.0

      transport_align_yaw_at_goal: true

  cmd_watchdog:
    ros__parameters:
      robot_name: "tracer1"
      watchdog_hz: 40.0
      age_safe_ms: 150.0
      age_stop_ms: 400.0
      decay_mode: "linear"
      decay_k: 3.0
      pair_window_ms: 60.0
      emergency_stop_topic: "/wing_alignment/emergency_stop"
      log_dir: "~/.ros/cmd_safety_logs"
      run_id: ""
      allow_unsafe_baseline: false
      baseline_mode: "current_safe_default"
      scheduler_mode: "current_hybrid"
      watchdog_mode: "decay_then_stop"
      baseline_execution_environment: "hardware"
      link_profile: "unspecified"
      profile_source: "assumed"
      communication_profile:
        mode: "wifi_nominal"
        profile_source: "configured"
        delay_ms_mean: 0.0
        jitter_ms: 0.0
        loss_rate: 0.0
        burst_loss_rate: 0.0
        executor_delay_ms: 0.0
        notes: "Configured profile for logging and offline/replay experiments; not a claim of measured 5G/Wi-Fi performance."

  qr_delta_publisher:
    ros__parameters:
      topic_pose_in: "object_position"
      topic_delta_out: "wing_alignment/delta"
      out_frame_id: "car_frame"
      deadband_m: 0.001
      max_pub_hz: 30.0
      publish_enabled_on_start: true
      publish_mode: "absolute"
      output_stamp_source: "now"
      fallback_to_local_stamp_on_clock_offset: true
      enforce_pose_max_age: false
      pose_max_age_sec: 2.0
      future_stamp_tolerance_sec: 1.0
      clock_offset_warn_sec: 60.0
      max_backward_jump_sec: 0.5
      zero_frames: 8
      zero_std_max_m: 0.010
      zero_max_wait_sec: 4.0
      max_jump_m: 0.80
      acquire_frames: 5
      acquire_std_max_m: 0.030
      reacquire_consistent_frames: 5
      duplicate_position_eps: 1.0e-5


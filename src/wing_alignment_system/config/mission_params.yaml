mission_coordinator:
  ros__parameters:
    # ===== mocap / world =====
    wing_mocap_topic: "/Rigid8/pose"
    mm_to_m: 0.001
    swap_xz: false
    negate_x: false
    negate_z: true
    freeze_wing_on_start: true
    use_goal_yaw: true
    mocap_timeout_sec: 0.50

    # ===== robots =====
    robots: ["tracer1", "tracer2", "tracer3"]
    dispatch_order: ["tracer1", "tracer2", "tracer3"]
    robot_mocap_topics: ["/Rigid17/pose", "/Rigid14/pose", "/Rigid15/pose"]
    # 按 tracer1~3 顺序配置；transport 底盘前馈优先使用 ekf 的 filtered odom
    robot_odom_topics: ["/tracer1/odometry/filtered", "/tracer2/odometry/filtered", "/tracer3/odometry/filtered"]
    robot_imu_topics: ["/tracer1/IMU_data", "/tracer2/IMU_data", "/tracer3/IMU_data"]

    # ===== tool offsets relative to wing =====
    tool_offsets_flat: [0.6070, -0.4753, 5.0, 0.4388, 0.2423, 6.0, -0.8521, 0.1302, 0.8]

    # ===== staging / entry =====
    staging_enable: true
    staging_offsets_flat: [-1.80, 1.80, -1.80, -1.80, -2.80, 0.00]
    entry_enable: true
    entry_zone_r: 2.2

    # ===== path / timing =====
    path_mode: "x_first"
    final_path_mode: "x_first"
    path_min_seg_m: 0.03
    reach_min_delay_sec: 0.25
    waypoint_dwell_sec: 2.0
    dwell_lock_stop: true
    final_precision_enable: true
    final_precision_robots: ["tracer1", "tracer2", "tracer3"]
    final_precision_window_m: 0.35

    micro_mode: "cross"
    micro_radii_m: [0.0, 0.08, 0.15]
    micro_max_attempts: 4
    micro_min_move_m: 0.07

    base_micro_search_enable: false
    wait_qr_fail_timeout_sec: 30.0

    start_mode: "parallel"
    cooperative_common_x_backoff_m: 0.0
    cooperative_anchor_robot: "tracer1"
    cooperative_start_line_y: [-3.320, -2.320, -1.320]
    cooperative_wait_tracer1_offset_y_m: 1.5
    cooperative_wait_side_mode: "follow_tracer1"

    # ===== topics =====
    delta_topic_template: "/{robot}/wing_alignment/delta"
    raw_qr_topic_template: "/{robot}/object_position"
    precision_topic_template: "/{robot}/precision_mode"
    emergency_stop_topic: "/wing_alignment/emergency_stop"
    force_contact_enable: true
    force_contact_topic_template: "/{slide}/force_contact"
    # 打开相机参与：恢复 WAIT_QR / fine alignment，并在 transport 中继续叠加视觉 delta
    alignment_vision_enable: true

    # ===== delta / estimator =====
    delta_arm_delay_sec: 0.30
    delta_max_age_sec: 2.0
    delta_frame_gap_max_sec: 2.5
    delta_stable_eps: 0.005
    delta_threshold_frames: 2
    delta_abs_max_m: 2.0

    te_min_confidence: 0.55
    te_ema_alpha: 0.45
    te_lost_timeout_sec: 2.5
    te_freeze_timeout_sec: 4.0
    te_jump_sigma: 0.02
    te_duplicate_eps: 1.0e-6
    te_max_jump_suppress: 0.800
    te_jump_decay_alpha: 0.3

    # ===== absolute delta 模式下不做 zero，直接 arm 即可 =====
    qr_zero_enable: false
    qr_zero_wait_max_sec: 4.0
    qr_zero_retry_sec: 0.5

    # ===== raw QR stability =====
    raw_qr_seen_timeout_sec: 0.6
    raw_qr_arm_delay_sec: 0.8
    raw_qr_accept_radius_m: 0.30
    raw_qr_min_hits: 2
    raw_qr_hit_timeout_sec: 2.5
    vision_stamp_offset_fallback_sec: 60.0

    raw_qr_min_x_m: -0.15
    raw_qr_max_x_m: 0.15
    raw_qr_max_abs_y_m: 0.12
    raw_qr_min_z_m: 0.03
    raw_qr_max_z_m: 0.50

    wait_qr_hold_on_raw_qr_sec: 10.0

    # ===== alignment tolerance =====
    fine_enable: true
    fine_xy_tol_m: 0.005
    fine_z_tol_m: 0.005
    fine_xy_stable_frames: 5

    # ===== approach slow =====
    approach_slow_enable: false
    approach_slow_r: 1.5
    approach_slow_hyst: 0.3

    # ===== collision gate =====
    gate_enable: true
    gate_near_wing_r: 2.0
    gate_dmin_far: 0.85
    gate_dresume_far: 1.10
    gate_dmin_near: 0.65
    gate_dresume_near: 0.80
    gate_hold_sec: 0.50
    gate_keep_one_moving: true

    # ===== global mission =====
    all_ready_hold_sec: 0.80
    sync_lift_settle_sec: 0.60 
    transport_enable: true
    # 世界坐标系目标偏移: [dx_m, dy_m, dyaw_deg]
    transport_goal_offset_xyyaw: [0.60, 0.0, 0.0]
    transport_profile_code: 2.0
    transport_goal_refresh_sec: 0.50
    transport_settle_sec: 1.00
    transport_finish_pos_tol_m: 0.08
    transport_finish_yaw_tol_deg: 6.0
    transport_max_center_error_m: 0.20
    transport_abort_on_wing_pose_lost: true

    # ===== P0: 带载 level / stable =====
    load_level_enable: true
    load_level_only_raise_z: true
    load_level_time_sec: 2.5
    load_level_z_tol_mm: 1.0
    load_level_vel_tol_mmps: 1.0

    # 接触判定阈值（只对"已接触/已受力"的滑台取 z_plane）
    load_level_contact_force_n: 18.0
    load_level_force_fresh_timeout_sec: 0.40
    load_level_z_plane_max_mm: 180.0
    load_level_z_plane_min_mm: 80.0

    load_stable_hold_sec: 1.5
    load_stable_slide_vel_tol_mmps: 1.0
    load_stable_force_window_sec: 1.0
    load_stable_force_slope_tol_nps: 3.0
    load_stable_force_fresh_timeout_sec: 0.40
    load_stable_delta_fresh_timeout_sec: 0.40
    load_stable_xy_tol_m: 0.012
    load_stable_z_tol_m: 0.10

    abort_on_any_fault: true
    loop_hz: 20.0

    # ===== slide continuous compensation =====
    slide_comp_enable: true
    # 上架/对位阶段只走 direct position，不走连续速度补偿
    slide_comp_alignment_enable: false
    slide_comp_transport_enable: true
    slide_comp_cmd_period_sec: 0.033

    slide_comp_x_sign: 1.0
    slide_comp_y_sign: 1.0
    slide_comp_z_sign: 1.0

    slide_comp_vx_gain_mmps_per_m: 600.0
    slide_comp_vy_gain_mmps_per_m: 600.0
    slide_comp_vz_gain_mmps_per_m: 400.0

    slide_comp_vx_limit_mmps: 40.0
    slide_comp_vy_limit_mmps: 40.0
    slide_comp_vz_limit_mmps: 20.0

    slide_comp_dx_deadband_m: 0.002
    slide_comp_dy_deadband_m: 0.002
    slide_comp_dz_deadband_m: 0.002

    slide_comp_hold_zero_on_lost: true
    slide_comp_abort_transport_on_hard_lost: false

    # ===== transport 带载随动 =====
    slide_transport_vx_gain_mmps_per_m: 120.0
    slide_transport_vy_gain_mmps_per_m: 120.0
    slide_transport_vz_gain_mmps_per_m: 120.0

    slide_transport_vx_limit_mmps: 10.0
    slide_transport_vy_limit_mmps: 10.0
    slide_transport_vz_limit_mmps: 10.0

    slide_transport_dx_deadband_m: 0.004
    slide_transport_dy_deadband_m: 0.004
    slide_transport_dz_deadband_m: 0.010
    slide_transport_dz_hold_tol_m: 0.015

    # ===== P1: transport XY 柔顺死区 / 力让步 =====
    slide_transport_force_yield_deadband_n: 12.0
    slide_transport_force_yield_full_n: 30.0
    slide_transport_force_yield_min_scale: 0.25

    # ===== transport 底盘运动前馈（odom/imu/mocap 融合）=====
    transport_chassis_fusion_enable: true
    transport_ff_enable: true
    transport_ff_use_mocap: true
    transport_ff_use_odom: true
    transport_ff_use_imu: true
    transport_chassis_fresh_timeout_sec: 0.40
    transport_mocap_twist_alpha: 0.35
    transport_ff_vx_gain_mmps_per_mps: 220.0
    transport_ff_vy_gain_mmps_per_mps: 220.0
    # yaw 前馈先保守一点，避免一开始过补偿
    transport_ff_yaw_enable: false
    transport_ff_yaw_gain_scale: 0.25
    # 没有视觉 delta 时，允许用底盘静止判据通过 stable hold / transport preflight
    transport_chassis_stable_body_vel_tol_mps: 0.015
    transport_chassis_stable_yaw_rate_tol_rps: 0.08

    # ===== transport 期间滑台 XY 回中 =====
    slide_transport_recenter_enable: true
    slide_transport_recenter_targets_flat: [125.0, 135.0, 126.0, 141.0, 126.0, 134.0]
    slide_transport_recenter_gain_mmps_per_mm: 0.8
    slide_transport_recenter_vxy_limit_mmps: 8.0
    slide_transport_recenter_xy_deadband_mm: 2.0

    # ===== slide realtime loop =====
    slide_rt_hz: 30.0
    slide_status_fresh_timeout_sec: 0.6
    slide_comp_ax_limit_mmps2: 120.0
    slide_comp_ay_limit_mmps2: 120.0
    slide_comp_az_limit_mmps2: 60.0
    slide_comp_vx_min_mmps: 2.0
    slide_comp_vy_min_mmps: 2.0
    slide_comp_vz_min_mmps: 1.0

    # ===== direct align fallback =====
    slide_direct_align_enable: true
    slide_direct_align_speed_mmps: 20.0
    slide_direct_align_min_time_sec: 0.10
    slide_direct_align_settle_margin_sec: 0.25
    slide_direct_align_fresh_timeout_sec: 1.50
    slide_direct_align_trigger_wait_sec: 0.80
    slide_direct_align_max_retry: 3
    slide_direct_align_pos_deadband_mm: 1.0
    slide_direct_align_xy_move_confirm_mm: 0.5
    slide_direct_align_ack_drop_timeout_sec: 0.8
    slide_direct_align_xy_move_timeout_margin_sec: 3.0
    slide_direct_align_contact_enable: true
    slide_post_contact_hold_sec: 5.0
    slide_direct_align_contact_seek_mm: 140.0

    # ===== alignment strategy (上架/对位阶段强制 direct) =====
    slide_align_mode: "direct_only"
    # 按 tracer1~3 顺序配置三轴能力: [x1,y1,z1,x2,y2,z2,x3,y3,z3]
    slide_axis_enable_flat: [1, 1, 1, 1, 1, 1, 1, 1, 1]

    # ===== slide recenter =====
    # slide_center_xyz_mm 作为公共 fallback；当上面的按车中心点存在时，XY 优先用按车中心，Z 仍取这里。
    slide_recenter_enable: true
    slide_recenter_mode: "physical_xy"
    slide_center_xyz_mm: [139.0, 138.5, 100.0]
    slide_recenter_time_sec: 6.0
    slide_recenter_tol_mm: 1.0
    slide_recenter_hold_sec: 0.50
    slide_recenter_abort_on_hard_lost: false

